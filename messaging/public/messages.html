<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages — Imperial Auto Care</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f3f3f6;
    color: #1a1a1f;
  }
  #qm-app-root {
    max-width: 1100px;
    margin: 24px auto;
    height: calc(100vh - 48px);
  }
  .qm-root { display: flex; height: 100%; min-height: 480px; border: 1px solid #e2e2e7; border-radius: 10px; overflow: hidden; background: #fff; }
  .qm-sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid #e2e2e7; display: flex; flex-direction: column; background: #fafafc; }
  .qm-sidebar-header { padding: 14px 14px 8px; border-bottom: 1px solid #ececef; }
  .qm-title { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
  .qm-tabs { display: flex; gap: 4px; }
  .qm-tab { border: none; background: transparent; padding: 5px 10px; border-radius: 6px; font-size: 12.5px; cursor: pointer; color: #6b6b76; }
  .qm-tab:hover { background: #ececef; }
  .qm-tab-active { background: #1a1a1f; color: #fff; }
  .qm-tab-active:hover { background: #1a1a1f; }
  .qm-conv-list { list-style: none; margin: 0; padding: 4px; overflow-y: auto; flex: 1; }
  .qm-conv-item { width: 100%; text-align: left; border: none; background: transparent; padding: 10px 10px; border-radius: 8px; cursor: pointer; display: block; margin-bottom: 2px; }
  .qm-conv-item:hover { background: #f0f0f3; }
  .qm-conv-item-active { background: #eef0ff; }
  .qm-conv-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .qm-conv-name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qm-conv-time { font-size: 11px; color: #9a9aa4; flex-shrink: 0; }
  .qm-conv-preview { font-size: 12.5px; color: #6b6b76; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .qm-conv-badges { display: flex; gap: 4px; flex-shrink: 0; }
  .qm-badge { font-size: 10.5px; font-weight: 600; padding: 1px 6px; border-radius: 999px; }
  .qm-badge-draft { background: #eef0ff; color: #4c4cd6; }
  .qm-badge-unread { background: #1a1a1f; color: #fff; }
  .qm-thread { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .qm-thread-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #ececef; }
  .qm-thread-name { font-size: 14.5px; font-weight: 600; }
  .qm-thread-phone { font-size: 12px; color: #9a9aa4; }
  .qm-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .qm-bubble-row { display: flex; }
  .qm-row-out { justify-content: flex-end; }
  .qm-row-in { justify-content: flex-start; }
  .qm-bubble { max-width: 70%; padding: 8px 12px; border-radius: 14px; }
  .qm-bubble-in { background: #f0f0f3; border-bottom-left-radius: 4px; }
  .qm-bubble-out { background: #4c4cd6; color: #fff; border-bottom-right-radius: 4px; }
  .qm-bubble-body { font-size: 13.5px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
  .qm-attachment { display: block; font-size: 12px; margin-top: 4px; color: inherit; }
  .qm-bubble-meta { font-size: 10.5px; opacity: 0.65; margin-top: 4px; }
  .qm-compose { border-top: 1px solid #ececef; padding: 12px 16px; }
  .qm-draft-label { font-size: 11.5px; font-weight: 600; color: #4c4cd6; margin-bottom: 6px; }
  .qm-textarea { width: 100%; border: 1px solid #d8d8de; border-radius: 8px; padding: 8px 10px; font-size: 13.5px; font-family: inherit; resize: vertical; }
  .qm-textarea:focus { outline: none; border-color: #4c4cd6; }
  .qm-compose-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .qm-btn { border: none; border-radius: 8px; padding: 7px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
  .qm-btn:disabled { opacity: 0.5; cursor: default; }
  .qm-btn-secondary { background: #ececef; color: #1a1a1f; }
  .qm-btn-secondary:hover:not(:disabled) { background: #e2e2e7; }
  .qm-btn-primary { background: #4c4cd6; color: #fff; }
  .qm-btn-primary:hover:not(:disabled) { background: #3f3fc0; }
  .qm-empty { padding: 24px 16px; text-align: center; font-size: 12.5px; color: #9a9aa4; }
  .qm-empty-main { flex: 1; display: flex; align-items: center; justify-content: center; }
  .qm-error { margin: 8px 12px; padding: 8px 10px; background: #fdeceb; color: #b3261e; border-radius: 6px; font-size: 12px; }
</style>
</head>
<body>
<!--
  Plain HTML + vanilla JS port of src/components/MessagingPanel.jsx.

  Why this exists alongside the .jsx file: the shop dashboard
  (imperialauto/shop) is server-rendered Python/FastAPI + Jinja2, not
  React — there's no bundler/build step to compile JSX anywhere in this
  stack. This page is the one that's actually reachable in a browser with
  zero build tooling; the .jsx file is kept in case you adopt a React
  front end later, but this HTML page is the real, working UI today.

  Same behavior as the React version: nothing sends a text automatically.
  Only clicking "Send" calls POST /api/messages/conversations/:id/send.
-->
<div id="qm-app-root"></div>
<script>
(function () {
  const API_BASE = "/api/messages";
  const POLL_MS = 15000;

  const state = {
    conversations: [],
    filter: "OPEN",
    listLoading: true,
    listError: null,
    selectedId: null,
    thread: null,
    threadLoading: false,
    threadError: null,
    composeText: "",
    activeDraftId: null,
    sending: false,
    regenerating: false,
    fetchingSigningLink: false,
    updatingStatus: false,
    actionError: null,
  };

  function formatRelativeTime(iso) {
    if (!iso) return "";
    const date = new Date(iso);
    const diffSec = Math.round((Date.now() - date.getTime()) / 1000);
    if (diffSec < 45) return "just now";
    const diffMin = Math.round(diffSec / 60);
    if (diffMin < 60) return diffMin + "m ago";
    const diffHr = Math.round(diffMin / 60);
    if (diffHr < 24) return diffHr + "h ago";
    const diffDay = Math.round(diffHr / 24);
    if (diffDay < 7) return diffDay + "d ago";
    return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function formatClockTime(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  }

  function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  async function apiFetch(path, options) {
    const res = await fetch(API_BASE + path, { headers: { "Content-Type": "application/json" }, ...options });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
    return data;
  }

  async function loadConversations() {
    try {
      const qs = state.filter === "ALL" ? "" : `?status=${state.filter}`;
      state.conversations = await apiFetch(`/conversations${qs}`);
      state.listError = null;
    } catch (err) {
      state.listError = err.message;
    } finally {
      state.listLoading = false;
      render();
    }
  }

  async function loadThread(id, { silent } = {}) {
    if (!id) return;
    if (!silent) { state.threadLoading = true; render(); }
    try {
      const data = await apiFetch(`/conversations/${id}`);
      state.thread = data;
      state.threadError = null;
      if (!silent) {
        const pendingDraft = data.drafts?.[0];
        state.composeText = pendingDraft?.body || "";
        state.activeDraftId = pendingDraft?.id || null;
      }
    } catch (err) {
      if (!silent) state.threadError = err.message;
    } finally {
      if (!silent) state.threadLoading = false;
      render();
    }
  }

  async function handleSend() {
    if (!state.selectedId || !state.composeText.trim() || state.sending) return;
    state.sending = true; state.actionError = null; render();
    try {
      await apiFetch(`/conversations/${state.selectedId}/send`, {
        method: "POST",
        body: JSON.stringify({ draftId: state.activeDraftId || undefined, body: state.composeText.trim() }),
      });
      state.composeText = "";
      state.activeDraftId = null;
      await Promise.all([loadThread(state.selectedId), loadConversations()]);
    } catch (err) {
      state.actionError = err.message;
    } finally {
      state.sending = false; render();
    }
  }

  async function handleRegenerate() {
    if (!state.selectedId || state.regenerating) return;
    state.regenerating = true; state.actionError = null; render();
    try {
      const draft = await apiFetch(`/conversations/${state.selectedId}/draft`, { method: "POST" });
      state.composeText = draft.body || "";
      state.activeDraftId = draft.id;
    } catch (err) {
      state.actionError = err.message;
    } finally {
      state.regenerating = false; render();
    }
  }

  async function handleGetSigningLink() {
    if (!state.selectedId || state.fetchingSigningLink) return;
    state.fetchingSigningLink = true; state.actionError = null; render();
    try {
      const result = await apiFetch(`/conversations/${state.selectedId}/signing-link`, { method: "POST" });
      state.composeText = result.draft?.body || "";
      state.activeDraftId = result.draft?.id || null;
    } catch (err) {
      state.actionError = err.message;
    } finally {
      state.fetchingSigningLink = false; render();
    }
  }

  async function handleToggleStatus() {
    if (!state.selectedId || !state.thread || state.updatingStatus) return;
    const nextStatus = state.thread.status === "DONE" ? "OPEN" : "DONE";
    state.updatingStatus = true; state.actionError = null; render();
    try {
      await apiFetch(`/conversations/${state.selectedId}/status`, {
        method: "POST",
        body: JSON.stringify({ status: nextStatus }),
      });
      state.thread.status = nextStatus;
      loadConversations();
    } catch (err) {
      state.actionError = err.message;
    } finally {
      state.updatingStatus = false; render();
    }
  }

  function selectConversation(id) {
    state.actionError = null;
    state.selectedId = id;
    loadThread(id);
    render();
  }

  function setFilter(f) {
    state.filter = f;
    state.listLoading = true;
    loadConversations();
    render();
  }

  function renderSidebar() {
    const tabs = ["OPEN", "DONE", "ALL"].map((f) => `
      <button type="button" class="qm-tab ${state.filter === f ? "qm-tab-active" : ""}" data-filter="${f}">
        ${f === "OPEN" ? "Open" : f === "DONE" ? "Done" : "All"}
      </button>`).join("");

    let listHtml;
    if (state.listLoading) {
      listHtml = `<div class="qm-empty">Loading…</div>`;
    } else if (state.conversations.length === 0) {
      listHtml = `<div class="qm-empty">No conversations</div>`;
    } else {
      listHtml = `<ul class="qm-conv-list">${state.conversations.map((c) => `
        <li>
          <button type="button" class="qm-conv-item ${state.selectedId === c.id ? "qm-conv-item-active" : ""}" data-conv-id="${c.id}">
            <div class="qm-conv-row">
              <span class="qm-conv-name">${escapeHtml(c.customerName || c.customerPhone)}</span>
              <span class="qm-conv-time">${formatRelativeTime(c.lastMessage?.quoCreatedAt)}</span>
            </div>
            <div class="qm-conv-row">
              <span class="qm-conv-preview">${c.lastMessage?.direction === "OUTBOUND" ? "You: " : ""}${escapeHtml(c.lastMessage?.body || "(no messages)")}</span>
              <span class="qm-conv-badges">
                ${c.hasPendingDraft ? `<span class="qm-badge qm-badge-draft">Draft</span>` : ""}
                ${c.unreadCount > 0 ? `<span class="qm-badge qm-badge-unread">${c.unreadCount}</span>` : ""}
              </span>
            </div>
          </button>
        </li>`).join("")}</ul>`;
    }

    return `
      <aside class="qm-sidebar">
        <div class="qm-sidebar-header">
          <h2 class="qm-title">Messages</h2>
          <div class="qm-tabs">${tabs}</div>
        </div>
        ${state.listError ? `<div class="qm-error">${escapeHtml(state.listError)}</div>` : ""}
        ${listHtml}
      </aside>`;
  }

  function renderThread() {
    if (!state.selectedId) {
      return `<main class="qm-thread"><div class="qm-empty qm-empty-main">Select a conversation</div></main>`;
    }
    if (state.threadLoading && !state.thread) {
      return `<main class="qm-thread"><div class="qm-empty qm-empty-main">Loading…</div></main>`;
    }
    if (state.threadError) {
      return `<main class="qm-thread"><div class="qm-error">${escapeHtml(state.threadError)}</div></main>`;
    }
    if (!state.thread) return `<main class="qm-thread"></main>`;

    const t = state.thread;
    const messagesHtml = t.messages.length === 0
      ? `<div class="qm-empty">No messages yet</div>`
      : t.messages.map((m) => `
        <div class="qm-bubble-row ${m.direction === "OUTBOUND" ? "qm-row-out" : "qm-row-in"}">
          <div class="qm-bubble ${m.direction === "OUTBOUND" ? "qm-bubble-out" : "qm-bubble-in"}">
            ${m.body ? `<div class="qm-bubble-body">${escapeHtml(m.body)}</div>` : ""}
            ${(m.mediaUrls || []).map((url) => `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer" class="qm-attachment">📎 Attachment</a>`).join("")}
            <div class="qm-bubble-meta">${formatClockTime(m.quoCreatedAt)}${m.direction === "OUTBOUND" && m.quoStatus ? " · " + escapeHtml(m.quoStatus) : ""}</div>
          </div>
        </div>`).join("");

    const hasPendingDraft = Boolean(state.activeDraftId);

    return `
      <main class="qm-thread">
        <div class="qm-thread-header">
          <div>
            <div class="qm-thread-name">${escapeHtml(t.customerName || t.customerPhone)}</div>
            ${t.customerName ? `<div class="qm-thread-phone">${escapeHtml(t.customerPhone)}</div>` : ""}
          </div>
          <button type="button" id="qm-toggle-status" class="qm-btn qm-btn-secondary" ${state.updatingStatus ? "disabled" : ""}>
            ${t.status === "DONE" ? "Reopen" : "Mark as done"}
          </button>
        </div>
        <div class="qm-messages" id="qm-messages">${messagesHtml}</div>
        ${state.actionError ? `<div class="qm-error">${escapeHtml(state.actionError)}</div>` : ""}
        <div class="qm-compose">
          ${hasPendingDraft ? `<div class="qm-draft-label">AI draft — review before sending</div>` : ""}
          <textarea class="qm-textarea" id="qm-compose-text" rows="3" placeholder="Type a reply…">${escapeHtml(state.composeText)}</textarea>
          <div class="qm-compose-actions">
            <button type="button" id="qm-signing-link" class="qm-btn qm-btn-secondary" ${state.fetchingSigningLink ? "disabled" : ""}>
              ${state.fetchingSigningLink ? "Looking up RO…" : "Send estimate for signature"}
            </button>
            <button type="button" id="qm-regenerate" class="qm-btn qm-btn-secondary" ${state.regenerating ? "disabled" : ""}>
              ${state.regenerating ? "Regenerating…" : "Regenerate draft"}
            </button>
            <button type="button" id="qm-send" class="qm-btn qm-btn-primary" ${state.sending || !state.composeText.trim() ? "disabled" : ""}>
              ${state.sending ? "Sending…" : "Send"}
            </button>
          </div>
        </div>
      </main>`;
  }

  function render() {
    const root = document.getElementById("qm-app-root");
    const scrollTop = document.getElementById("qm-messages")?.scrollTop;
    const composeHadFocus = document.activeElement?.id === "qm-compose-text";
    const caret = composeHadFocus ? document.activeElement.selectionStart : null;

    root.innerHTML = `<div class="qm-root">${renderSidebar()}${renderThread()}</div>`;

    root.querySelectorAll("[data-filter]").forEach((btn) => btn.addEventListener("click", () => setFilter(btn.dataset.filter)));
    root.querySelectorAll("[data-conv-id]").forEach((btn) => btn.addEventListener("click", () => selectConversation(btn.dataset.convId)));
    root.querySelector("#qm-toggle-status")?.addEventListener("click", handleToggleStatus);
    root.querySelector("#qm-regenerate")?.addEventListener("click", handleRegenerate);
    root.querySelector("#qm-signing-link")?.addEventListener("click", handleGetSigningLink);
    root.querySelector("#qm-send")?.addEventListener("click", handleSend);
    const textarea = root.querySelector("#qm-compose-text");
    if (textarea) {
      textarea.addEventListener("input", (e) => {
        state.composeText = e.target.value;
        root.querySelector("#qm-send").disabled = state.sending || !state.composeText.trim();
      });
      if (composeHadFocus) {
        textarea.focus();
        if (caret != null) textarea.setSelectionRange(caret, caret);
      }
    }
    const messagesDiv = root.querySelector("#qm-messages");
    if (messagesDiv) {
      if (scrollTop == null) messagesDiv.scrollTop = messagesDiv.scrollHeight; // first render of this thread: jump to latest
      else messagesDiv.scrollTop = scrollTop;
    }
  }

  // Initial load + list polling.
  loadConversations();
  setInterval(loadConversations, POLL_MS);

  // Quiet poll of the open thread for new inbound texts.
  setInterval(() => { if (state.selectedId) loadThread(state.selectedId, { silent: true }); }, POLL_MS);

  render();
})();
</script>
</body>
</html>
