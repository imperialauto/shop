<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Imperial Auto Care</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #1a0a2e; color: #e8e0d5; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">⚙</div>
      <h1 class="text-2xl font-bold text-yellow-400">Imperial Auto Care</h1>
      <p class="text-gray-400 text-sm mt-1">Shop Management System</p>
    </div>

    <div class="bg-purple-950 border border-purple-800 rounded-lg p-6">
      {% if error %}
      <div class="bg-red-900 border border-red-700 text-red-200 text-sm rounded px-3 py-2 mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-4">
          <label class="block text-gray-400 text-xs font-semibold mb-1 uppercase tracking-wide">Username</label>
          <input type="text" name="username" autofocus required
            class="bg-purple-900 border border-purple-700 text-gray-200 rounded px-3 py-2 w-full text-sm focus:outline-none focus:border-yellow-400" />
        </div>
        <div class="mb-6">
          <label class="block text-gray-400 text-xs font-semibold mb-1 uppercase tracking-wide">Password</label>
          <input type="password" name="password" required
            class="bg-purple-900 border border-purple-700 text-gray-200 rounded px-3 py-2 w-full text-sm focus:outline-none focus:border-yellow-400" />
        </div>
        <button type="submit"
          class="w-full bg-yellow-500 hover:bg-yellow-400 text-purple-900 font-bold py-2 rounded text-sm transition-colors">
          Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
