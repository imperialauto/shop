<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Status — Imperial Auto Care</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background-color: #1a0a2e; color: #e8e0d5; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-sm w-full">
    <div class="text-center mb-6">
      <div class="text-3xl mb-1">⚙</div>
      <h1 class="text-xl font-bold text-yellow-400">Imperial Auto Care</h1>
      <p class="text-gray-400 text-sm">Vehicle Status Update</p>
    </div>
    <div class="bg-purple-950 border border-purple-800 rounded-lg p-5">
      <p class="text-stone-400 text-xs uppercase tracking-wide mb-1">Vehicle</p>
      <p class="font-semibold text-lg">{{ ro.vehicle.year }} {{ ro.vehicle.make }} {{ ro.vehicle.model }}</p>
      <p class="text-stone-400 text-sm mt-3">Current Status</p>
      <p class="text-yellow-400 font-bold text-xl mt-1">{{ ro.status.replace('_', ' ').title() }}</p>
      {% if ro.concern %}
      <p class="text-stone-400 text-xs mt-4 uppercase tracking-wide">Concern</p>
      <p class="text-stone-200 text-sm mt-1">{{ ro.concern }}</p>
      {% endif %}
      <p class="text-stone-500 text-xs mt-5 text-center">Questions? Call us at (602) 555-0100</p>
    </div>
  </div>
</body>
</html>
