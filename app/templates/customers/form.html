{% extends "base.html" %}
{% block title %}{% if customer %}Edit{% else %}New{% endif %} Customer — Imperial Auto Care{% endblock %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <a href="/customers/" class="text-stone-400 hover:text-gold-300">← Customers</a>
  <h1 class="text-2xl font-bold text-yellow-400">{% if customer %}Edit Customer{% else %}New Customer{% endif %}</h1>
</div>

<form method="post" action="{% if customer %}/customers/{{ customer.id }}/edit{% else %}/customers/new{% endif %}" class="max-w-xl space-y-4">
  <div class="card space-y-4">

    <div>
      <label class="form-label">Customer Type</label>
      <div class="flex gap-4 mt-1">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="customer_type" value="individual"
            {% if not customer or customer.customer_type == 'individual' %}checked{% endif %}
            onchange="document.getElementById('fleet-section').classList.toggle('hidden', this.value=='individual')" />
          <span class="text-sm">Individual</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="customer_type" value="fleet"
            {% if customer and customer.customer_type == 'fleet' %}checked{% endif %}
            onchange="document.getElementById('fleet-section').classList.toggle('hidden', false)" />
          <span class="text-sm"><span class="badge-fleet">FLEET</span></span>
        </label>
      </div>
    </div>

    <div id="fleet-section" class="{% if not customer or customer.customer_type != 'fleet' %}hidden{% endif %}">
      <label class="form-label">Fleet / Company Name</label>
      <input type="text" name="fleet_name" value="{{ customer.fleet_name if customer else '' }}" class="form-input" placeholder="e.g. ABC Plumbing" />
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="form-label">First Name *</label>
        <input type="text" name="first_name" required value="{{ customer.first_name if customer else '' }}" class="form-input" />
      </div>
      <div>
        <label class="form-label">Last Name *</label>
        <input type="text" name="last_name" required value="{{ customer.last_name if customer else '' }}" class="form-input" />
      </div>
    </div>

    <div>
      <label class="form-label">Phone</label>
      <input type="text" name="phone" value="{{ customer.phone if customer else '' }}" class="form-input" placeholder="(602) 555-1234" />
    </div>

    <div>
      <label class="form-label">Email</label>
      <input type="email" name="email" value="{{ customer.email if customer else '' }}" class="form-input" />
    </div>

    <div>
      <label class="form-label">Address</label>
      <input type="text" name="address" value="{{ customer.address if customer else '' }}" class="form-input" />
    </div>

    <div>
      <label class="form-label">Notes</label>
      <textarea name="notes" rows="3" class="form-input">{{ customer.notes if customer else '' }}</textarea>
    </div>
  </div>

  <div class="flex gap-3">
    <button type="submit" class="btn-primary">{% if customer %}Save Changes{% else %}Create Customer{% endif %}</button>
    <a href="/customers/" class="btn-secondary">Cancel</a>
  </div>
</form>

{% endblock %}
