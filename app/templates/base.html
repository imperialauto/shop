<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Imperial Auto Care{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { 500: '#d4a853', 400: '#e0b96a', 300: '#edcc8a' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #09090b; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Sidebar */
    .sidebar { width: 220px; min-height: 100vh; background: #111113; border-right: 1px solid rgba(255,255,255,0.06); position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 50; }
    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-logo .brand { font-size: 15px; font-weight: 700; color: #d4a853; letter-spacing: -0.3px; }
    .sidebar-logo .sub { font-size: 11px; color: #52525b; margin-top: 2px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: #71717a; text-decoration: none; margin-bottom: 2px; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #e4e4e7; }
    .nav-item.active { background: rgba(212,168,83,0.12); color: #d4a853; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-section { font-size: 10px; font-weight: 600; color: #3f3f46; text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 10px 4px; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-footer a { font-size: 12px; color: #52525b; text-decoration: none; display: block; }
    .sidebar-footer a:hover { color: #71717a; }
    .sidebar-footer .username { font-size: 13px; color: #a1a1aa; font-weight: 500; margin-bottom: 4px; }

    /* Main content */
    .main-content { margin-left: 220px; min-height: 100vh; }
    .page-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-size: 20px; font-weight: 700; color: #fafafa; }
    .page-body { padding: 20px 28px 32px; }

    /* Cards */
    .card { background: #18181b; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; }
    .card-sm { background: #18181b; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px 14px; }

    /* Buttons */
    .btn-primary { background: #d4a853; color: #09090b; font-weight: 600; font-size: 13px; padding: 7px 14px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; border: none; cursor: pointer; }
    .btn-primary:hover { background: #e0b96a; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: #a1a1aa; font-weight: 500; font-size: 13px; padding: 7px 14px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.08); transition: all 0.15s; cursor: pointer; }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #e4e4e7; }
    .btn-danger { background: rgba(239,68,68,0.1); color: #f87171; font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.2); cursor: pointer; transition: all 0.15s; }
    .btn-danger:hover { background: rgba(239,68,68,0.18); }

    /* Forms */
    .form-input { background: #09090b; border: 1px solid rgba(255,255,255,0.1); color: #e4e4e7; border-radius: 8px; padding: 7px 12px; width: 100%; font-size: 13.5px; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: #d4a853; }
    .form-select { background: #09090b; border: 1px solid rgba(255,255,255,0.1); color: #e4e4e7; border-radius: 8px; padding: 7px 12px; width: 100%; font-size: 13.5px; outline: none; }
    .form-select:focus { border-color: #d4a853; }
    .form-label { display: block; font-size: 11.5px; font-weight: 600; color: #52525b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
    textarea.form-input { resize: vertical; }

    /* Tables */
    table { width: 100%; font-size: 13.5px; border-collapse: collapse; }
    thead th { text-align: left; font-size: 11px; font-weight: 600; color: #52525b; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    tbody td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #a1a1aa; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }
    tbody td:first-child { color: #e4e4e7; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
    .badge-fleet { background: rgba(212,168,83,0.15); color: #d4a853; border: 1px solid rgba(212,168,83,0.25); }
    .badge-intake    { background: rgba(113,113,122,0.15); color: #a1a1aa; }
    .badge-diagnosing { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-waiting_parts { background: rgba(249,115,22,0.15); color: #fb923c; }
    .badge-in_progress { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-waiting_approval { background: rgba(234,179,8,0.15); color: #facc15; }
    .badge-complete  { background: rgba(168,85,247,0.15); color: #c084fc; }
    .badge-delivered { background: rgba(20,184,166,0.15); color: #2dd4bf; }

    /* Misc */
    .section-label { font-size: 11px; font-weight: 600; color: #52525b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 16px 0; }
  </style>
</head>
<body>

{% if user is defined and user %}
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">⚙ Imperial Auto</div>
    <div class="sub">Shop Management</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="/dashboard" class="nav-item {% if request.url.path == '/dashboard' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="/ro/" class="nav-item {% if '/ro/' in request.url.path %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Repair Orders
    </a>
    <a href="/estimates/" class="nav-item {% if '/estimates/' in request.url.path %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Estimates
    </a>
    <a href="/invoices/" class="nav-item {% if '/invoices/' in request.url.path %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Invoices
    </a>

    <div class="nav-section">Customers</div>
    <a href="/customers/" class="nav-item {% if '/customers/' in request.url.path and 'fleet' not in request.url.query %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      All Customers
    </a>
    <a href="/customers/?type_filter=fleet" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      Fleet
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="username">{{ user.full_name or user.username }}</div>
    <a href="/settings">Settings</a>
    <a href="/logout" style="color:#ef4444; margin-top:4px;">Sign out</a>
  </div>
</div>
{% endif %}

<div class="{% if user is defined and user %}main-content{% endif %}">
  {% block content %}{% endblock %}
</div>

</body>
</html>
